<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DECLUTTER | ©BJML</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;900&family=Space+Mono&display=swap');

        :root {
            --bg: #e0e0e0;
            --text: #1d1d1d;
            --container-width: 2000px;
        }
        body.dark-mode {
            --bg: #1d1d1d;
            --text: #9c9b9a;
        }
        body {
            background-color: var(--bg);
            color: var(--text);
            font-family: 'Inter', sans-serif;
            margin: 0;
            transition: all 0.5s cubic-bezier(0.4, 0, 0.2, 1);
            overflow-x: hidden;
            display: flex;
            flex-direction: column;
            min-height: 100vh;
        }
        
        .container {
            width: 90%;
            max-width: var(--container-width);
            margin: 0 auto;
            padding: 5vh 0;
            flex-grow: 1;
        }
        
        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 2px solid var(--text);
            padding-bottom: 20px;
        }
        
        .logo {
            font-size: clamp(1.5rem, 5vw, 3rem);
            font-weight: 1000;
            text-transform: uppercase;
        }
        
        .hero-title {
            font-size: clamp(2.2rem, 8vw, 5.5rem); 
            font-weight: 600;
            line-height: 0.95;
            margin: 4vh 0 4vh 0;
            letter-spacing: -0.04em;
        }
        
        .app-window {
            background: var(--text);
            color: var(--bg);
            padding: clamp(20px, 4vw, 40px);
            border-radius: 25px;
            box-shadow: 0 5px 10px #00002d;
        }
        
        .input-container {
            display: flex;
            align-items: center;
            border-bottom: 2px solid var(--bg);
            transition: all 0.3s ease;
        }
        .task-input {
            flex-grow: 1;
            background: transparent;
            border: none !important;
            color: var(--bg);
            font-size: clamp(1.1rem, 3vw, 1.8rem);
            padding: 20px 0;
            outline: none;
            font-family: 'Space Mono', monospace;
        }
        .task-input:focus {
            background: rgba(255,255,255,0.05);
        }
        .plus-btn {
            background: transparent;
            border: none;
            color: var(--bg);
            font-size: 1.5rem;
            cursor: pointer;
            padding: 0 10px;
            transition: transform 0.2s ease;
        }
        
        .controls {
            margin-top: 40px;
            display: flex;
            gap: 15px;
            flex-wrap: wrap;
        }
        .controls span {
            border: 1px solid var(--bg);
            padding: 10px 15px;
            font-size: 0.8rem;
            font-family: 'Space Mono', monospace;
            flex-grow: 1;
            text-align: center;
            cursor: pointer;
            transition: 0.3s;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }
        .controls span:hover {
            background: var(--bg);
            color: var(--text);
        }
        
        #task-list {
            margin-top: 30px;
            padding: 0;
            background: transparent;
            border-radius: 4px;
            overflow: hidden;
        }
        .task-item {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 15px 20px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
            background: rgba(255, 255, 255, 0.05);
            color: #727376;
            transition: 0.2s;
        }
        .task-item:hover {
            background: rgba(255, 255, 255, 0.20) !important;
        }
        .task-action-btn {
            background: transparent;
            border: 1px solid #4d4d4d;
            color: #727376;
            font-size: 14px;
            width: 35px;
            height: 35px;
            cursor: pointer;
            transition: 0.2s;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .task-action-btn:hover {
            background: #ffffff;
            color: #1d1d1d;
        }
        .completed-text {
            text-decoration: line-through;
            blur-filter: inherit;
            opacity: 0.5;
        }
        
        .stats-container {
            display: flex;
            gap: 20px;
            margin-top: 20px;
            font-family: 'Space Mono', monospace;
            font-size: 0.75rem;
            opacity: 0.7;
            border-top: 1px solid rgba(255,255,255,0.2);
            padding-top: 15px;
        }
        .credits {
            margin-top: 5vh;
            font-size: 1.0rem;
            text-transform: uppercase;
            letter-spacing: 2px;
            opacity: 0.9;
            padding-bottom: 5px;
        }
        
        .btn-toggle {
            cursor: pointer;
            padding: 8px 16px;
            border: 2px solid var(--text);
            background: transparent;
            color: var(--text);
            font-weight: bold;
            font-size: 0.8rem;
        }
        
        @media (max-width: 600px) {
            .hero-title { margin-top: 30px; }
            header { flex-direction: row; }
        }
    </style>
</head>
<body>

    <div class="container">
        <header>
          <div class="logo">DECLUTTER</div>
          <button class="btn-toggle" onclick="document.body.classList.toggle('dark-mode')">NOW</button>
        </header>

        <h1 class="hero-title">Clashing Ideas?<br>List it Out!<br>Clean Your Mind.</h1>

        <div class="app-window">
            <p style="font-family: 'Space Mono'; opacity: 0.8; font-size: 1.2rem; margin-bottom: 5px;">STATUS: DECLUTTERING</p>
            
            <div class="input-container" id="inputWrapper">
                <input type="text" id="taskInput" class="task-input" placeholder=" What's Your Necessary Step? Move on.">
                <button id="inlineAddBtn" class="plus-btn">
                    <i class="fa-solid fa-plus"></i>
                </button>
            </div>

            <div class="controls">
                <span id="addBtn">ADD_TASK</span>
                <span id="sortAsc"></i>SORT_ASC</span>
                <span id="undoBtn">UNDO_REDO</span>
                <span id="selectAllBtn">SELECT_IT</span>
                <span id="resetBtn"></i>CLEAN_UP</span>
                <span id="clearAllBtn">RESET_ALL</span>
            </div>

            <div id="task-list"></div>

            <div class="stats-container">
                <span>TOTAL: <span id="totalTasks">0</span></span>
                <span>DONE: <span id="doneTasks">0</span></span>
                <span>EDITED: <span id="editTasks">0</span></span>
                <span>DELETED: <span id="deletedTasks">0</span></span>
            </div>
        </div>

        <div class="credits">
            Made by Bryan Jay M. Lumabas from BSIT2D     |     ©BJML 2026
        </div>
    </div>

    <script src="Declutter.js"></script>
</body>
</html>
